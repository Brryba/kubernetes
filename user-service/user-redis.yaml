apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-redis-deployment
  labels:
    app: user-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-redis
  template:
    metadata:
      labels:
        app: user-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: user-redis
spec:
  selector:
    app: user-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379