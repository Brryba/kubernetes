apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-redis-deployment
  labels:
    app: user-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-redis
  template:
    metadata:
      labels:
        app: user-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2

---
apiVersion: v1
kind: Service
metadata:
  name: user-redis
spec:
  selector:
    app: user-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379