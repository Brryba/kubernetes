apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: user-redis-stateful-set
  labels:
    app: user-redis
spec:
  replicas: 1
  serviceName: user-redis
  selector:
    matchLabels:
      app: user-redis
  template:
    metadata:
      labels:
        app: user-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: user-redis-storage
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
  volumeClaimTemplates:
    - metadata:
        name: user-redis-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 100Mi

---
apiVersion: v1
kind: Service
metadata:
  name: user-redis
spec:
  selector:
    app: user-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379