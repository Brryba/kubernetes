apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deployment
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: DB_PASSWORD
            - name: DB_USER_SCHEMA
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: DB_USER_SCHEMA
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://user-db:5432/$(DB_USER_SCHEMA)"
          envFrom:
            - configMapRef:
                name: user-service-config

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80