apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: DB_PASSWORD
            - name: DB_AUTH_SCHEMA
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: DB_AUTH_SCHEMA
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: JWT_KEY
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://auth-db:5432/$(DB_AUTH_SCHEMA)"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 80
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 80
            initialDelaySeconds: 45
            periodSeconds: 5
            failureThreshold: 5
            timeoutSeconds: 2

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80