common-chart:
  replicaCount: 1

  image:
    repository: auth-service
    tag: latest

  service:
    name: auth-service

  env:
    - name: SPRING_DATASOURCE_USERNAME
      valueFrom:
        secretKeyRef:
          name: innowise-app-secret
          key: DB_USER
    - name: SPRING_DATASOURCE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: innowise-app-secret
          key: DB_PASSWORD
    - name: DB_AUTH_SCHEMA
      valueFrom:
        secretKeyRef:
          name: innowise-app-secret
          key: DB_AUTH_SCHEMA
    - name: JWT_KEY
      valueFrom:
        secretKeyRef:
          name: innowise-app-secret
          key: JWT_KEY
    - name: SPRING_DATASOURCE_URL
      value: "jdbc:postgresql://auth-db:5432/$(DB_AUTH_SCHEMA)"

postgresql:
  auth:
    username: "user"
    database: "auth_service"
    existingSecret: innowise-app-secret
    secretKeys:
      adminPasswordKey: DB_PASSWORD
      userPasswordKey: DB_PASSWORD

  persistence:
    enabled: true
    size: 100Mi

  fullnameOverride: "auth-db"

  service:
    type: ClusterIP
    ports:
      postgresql: 5432