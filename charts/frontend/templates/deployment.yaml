apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: frontend
          image: {{ .Values.service.image.name }}:{{ .Values.service.image.version }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.application.port }}