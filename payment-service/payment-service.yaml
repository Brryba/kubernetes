apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-deployment
  labels:
    app: payment-service
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: MONGO_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: MONGO_PASSWORD
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: MONGO_DB
            - name: MONGO_DB_URI
              valueFrom:
                secretKeyRef:
                  name: innowise-app-secret
                  key: MONGO_DB_URI
          envFrom:
            - configMapRef:
                name: payment-service-config

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80